stages:
  - validate
  - publish

validate:
  image: oven/bun:1.3.13
  stage: validate
  script:
    - bun install --frozen-lockfile
    - bun run typecheck
    - bun run build
    - bun run smoke:boundary
    - bun run pack:check

publish:npm:
  image: oven/bun:1.3.13
  stage: publish
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'
  script:
    - test -n "$NPM_TOKEN"
    - bun install --frozen-lockfile
    - bun run typecheck
    - bun run build
    - bun run smoke:boundary
    - bun run pack:check
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - npm publish --access public
